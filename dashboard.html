<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>数据管理 · NLP卡点定位器</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#f5f6fa;color:#2d3436;padding:20px 16px 60px}
.container{max-width:1200px;margin:0 auto}

/* 顶栏 */
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.top-bar h1{font-size:18px;font-weight:700;color:#2d3436}
.top-bar .info{font-size:13px;color:#636e72}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;transition:all .2s}
.btn-primary{background:#4A3AFF;color:#fff}
.btn-primary:hover{background:#3a2aef}
.btn-outline{background:#fff;color:#4A3AFF;border:1px solid #4A3AFF}
.btn-outline:hover{background:#f0eeff}
.btn-success{background:#00b894;color:#fff}
.btn-success:hover{background:#00a381}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* 筛选栏 */
.filter-bar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-bar select,.filter-bar input{padding:7px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff;color:#2d3436;outline:none}
.filter-bar select:focus,.filter-bar input:focus{border-color:#4A3AFF}
.filter-bar input{min-width:160px}
.filter-bar .count{font-size:13px;color:#636e72;margin-left:auto}

/* 表格 */
.table-wrap{background:#fff;border-radius:12px;overflow-x:auto;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:1000px}
thead{background:#f8f9fa;position:sticky;top:0;z-index:1}
th{padding:12px 10px;text-align:left;font-weight:600;color:#636e72;font-size:12px;white-space:nowrap;border-bottom:2px solid #eee;cursor:pointer;user-select:none}
th:hover{color:#4A3AFF}
th .sort-arrow{font-size:10px;margin-left:4px;opacity:.4}
th.sorted .sort-arrow{opacity:1;color:#4A3AFF}
td{padding:10px;color:#2d3436;border-bottom:1px solid #f1f2f6;white-space:nowrap}
tr:hover td{background:#f8f9fa}
.score{font-weight:600;font-variant-numeric:tabular-nums}
.score-low{color:#e17055}
.score-mid{color:#fdcb6e}
.score-high{color:#00b894}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.tag-env{background:#e0f7fa;color:#00838f}
.tag-beh{background:#e8f5e9;color:#2e7d32}
.tag-cap{background:#fff8e1;color:#f57f17}
.tag-bel{background:#fce4ec;color:#c62828}
.tag-iden{background:#ede7f6;color:#4527a0}
.tag-vis{background:#e8eaf6;color:#283593}
.blocker-cell{white-space:normal;max-width:220px;font-size:12px;color:#636e72;line-height:1.4}

/* 空/加载态 */
.state-msg{text-align:center;padding:60px 20px;color:#b2bec3}
.state-msg .icon{font-size:40px;margin-bottom:10px}

/* 底部 */
.footer{text-align:center;padding:24px 0 12px;color:#b2bec3;font-size:11px}

@media(max-width:768px){
  .top-bar{flex-direction:column;align-items:flex-start}
  .filter-bar{flex-direction:column}
  .filter-bar .count{margin-left:0;margin-top:4px}
}
</style>
</head>
<body>

<div class="container">
  <div class="top-bar">
    <div>
      <h1>NLP卡点定位器 · 数据管理</h1>
      <div class="info" id="updateInfo">加载中...</div>
    </div>
    <div class="actions">
      <button class="btn btn-outline" onclick="loadData()">刷新数据</button>
      <button class="btn btn-success" onclick="exportExcel()">导出 Excel</button>
    </div>
  </div>

  <div class="filter-bar">
    <select id="filterBottleneck" onchange="applyFilters()">
      <option value="">全部卡点层</option>
    </select>
    <select id="filterLever" onchange="applyFilters()">
      <option value="">全部撬动点</option>
    </select>
    <input type="text" id="searchInput" placeholder="搜索昵称/阻碍类型..." oninput="applyFilters()">
    <span class="count" id="filterCount"></span>
  </div>

  <div id="content">
    <div class="state-msg"><div class="icon">⏳</div><p>正在加载数据...</p></div>
  </div>

  <div class="footer">数据实时同步自 GitHub Issues</div>
</div>

<script>
const REPO = 'Chunyang001/Survey';
const API = `https://api.github.com/repos/${REPO}/issues`;
let allData = [];
let filteredData = [];
let sortCol = null;
let sortAsc = true;

async function loadData() {
  try {
    let page = 1, all = [];
    while (true) {
      const resp = await fetch(`${API}?state=open&per_page=100&page=${page}`, {
        headers: { 'Accept': 'application/vnd.github.v3+json' }
      });
      const data = await resp.json();
      if (!Array.isArray(data) || data.length === 0) break;
      all = all.concat(data);
      if (data.length < 100) break;
      page++;
    }

    allData = all
      .filter(i => i.title.startsWith('[测试]') || i.labels.some(l => l.name === 'test-data'))
      .filter(i => !i.title.includes('CORS测试') && !i.title.includes('API测试'))
      .map(parseIssue)
      .filter(d => d !== null)
      .sort((a, b) => new Date(b.raw.created_at) - new Date(a.raw.created_at));

    populateFilters();
    applyFilters();

    const now = new Date().toLocaleString('zh-CN');
    document.getElementById('updateInfo').textContent = `共 ${allData.length} 条记录 · 更新于 ${now}`;
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="state-msg"><div class="icon">⚠️</div><p>数据加载失败: ${e.message}</p></div>`;
  }
}

function parseIssue(issue) {
  const body = issue.body || '';
  const lines = body.split('\n').filter(l => l.trim());
  const data = { raw: issue, nickname: '' };

  for (const line of lines) {
    // 支持 Markdown 表格格式和 普通键值格式
    let key, val;
    const tableMatch = line.match(/\|\s*(.+?)\s*\|\s*(.+?)\s*\|/);
    const kvMatch = line.match(/^(.+?)[:：]\s*(.+)$/);

    if (tableMatch) {
      key = tableMatch[1].trim();
      val = tableMatch[2].trim();
    } else if (kvMatch) {
      key = kvMatch[1].trim();
      val = kvMatch[2].trim();
    } else continue;

    if (key === '字段' || key.startsWith('---')) continue;

    if (key === '测试时间') data.time = val;
    else if (key === '昵称') data.nickname = val;
    else if (key === '环境层得分' || key === '环境层') data.env = parseFloat(val);
    else if (key === '行为层得分' || key === '行为层') data.beh = parseFloat(val);
    else if (key === '能力层得分' || key === '能力层') data.cap = parseFloat(val);
    else if (key === '信念层得分' || key === '信念层') data.bel = parseFloat(val);
    else if (key === '身份层得分' || key === '身份层') data.iden = parseFloat(val);
    else if (key === '愿景层得分' || key === '愿景层') data.vision = parseFloat(val);
    else if (key === '卡点层') data.bottleneck = val;
    else if (key === '撬动点') data.lever = val;
    else if (key === '阻碍类型') data.blocker = val;
    else if (key === '行动口号') data.slogan = val;
  }

  // 如果没有昵称，从标题中提取（如 "[测试] 2026-07-18 23:52"）
  if (!data.nickname || data.nickname === '') {
    data.nickname = '未命名';
  }

  if (data.env === undefined || isNaN(data.env)) return null;
  return data;
}

function populateFilters() {
  const bSet = new Set(), lSet = new Set();
  allData.forEach(d => {
    if (d.bottleneck) bSet.add(d.bottleneck);
    if (d.lever) lSet.add(d.lever);
  });

  const bSel = document.getElementById('filterBottleneck');
  const lSel = document.getElementById('filterLever');
  bSel.innerHTML = '<option value="">全部卡点层</option>';
  lSel.innerHTML = '<option value="">全部撬动点</option>';

  [...bSet].sort().forEach(v => { bSel.innerHTML += `<option value="${v}">${v}</option>`; });
  [...lSet].sort().forEach(v => { lSel.innerHTML += `<option value="${v}">${v}</option>`; });
}

function applyFilters() {
  const bVal = document.getElementById('filterBottleneck').value;
  const lVal = document.getElementById('filterLever').value;
  const search = document.getElementById('searchInput').value.toLowerCase().trim();

  filteredData = allData.filter(d => {
    if (bVal && d.bottleneck !== bVal) return false;
    if (lVal && d.lever !== lVal) return false;
    if (search) {
      const text = `${d.nickname} ${d.blocker} ${d.slogan} ${d.bottleneck}`.toLowerCase();
      if (!text.includes(search)) return false;
    }
    return true;
  });

  if (sortCol) doSort(false);
  render();
}

function toggleSort(col) {
  if (sortCol === col) {
    sortAsc = !sortAsc;
  } else {
    sortCol = col;
    sortAsc = true;
  }
  doSort(true);
  render();
}

function doSort(rerender) {
  if (!sortCol) return;
  filteredData.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'number' && typeof vb === 'number') return sortAsc ? va - vb : vb - va;
    va = (va || '').toString(); vb = (vb || '').toString();
    return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });
}

function getScoreClass(v) {
  if (isNaN(v)) return '';
  if (v >= 4) return 'score-high';
  if (v >= 2.5) return 'score-mid';
  return 'score-low';
}

function getTagClass(name) {
  if (!name) return '';
  if (name.includes('环境')) return 'tag-env';
  if (name.includes('行为')) return 'tag-beh';
  if (name.includes('能力')) return 'tag-cap';
  if (name.includes('信念')) return 'tag-bel';
  if (name.includes('身份')) return 'tag-iden';
  if (name.includes('愿景')) return 'tag-vis';
  return '';
}

function render() {
  const c = document.getElementById('content');
  document.getElementById('filterCount').textContent = `显示 ${filteredData.length} / ${allData.length} 条`;

  if (filteredData.length === 0) {
    c.innerHTML = `<div class="state-msg"><div class="icon">📭</div><p>暂无匹配数据</p></div>`;
    return;
  }

  const sortArrow = (col) => {
    if (sortCol === col) return `<span class="sort-arrow">${sortAsc ? '▲' : '▼'}</span>`;
    return `<span class="sort-arrow">⇅</span>`;
  };
  const thClass = (col) => sortCol === col ? 'sorted' : '';

  let html = `<div class="table-wrap"><table>
    <thead><tr>
      <th class="${thClass('nickname')}" onclick="toggleSort('nickname')">昵称${sortArrow('nickname')}</th>
      <th class="${thClass('time')}" onclick="toggleSort('time')">测试时间${sortArrow('time')}</th>
      <th class="${thClass('env')}" onclick="toggleSort('env')">环境层${sortArrow('env')}</th>
      <th class="${thClass('beh')}" onclick="toggleSort('beh')">行为层${sortArrow('beh')}</th>
      <th class="${thClass('cap')}" onclick="toggleSort('cap')">能力层${sortArrow('cap')}</th>
      <th class="${thClass('bel')}" onclick="toggleSort('bel')">信念层${sortArrow('bel')}</th>
      <th class="${thClass('iden')}" onclick="toggleSort('iden')">身份层${sortArrow('iden')}</th>
      <th class="${thClass('vision')}" onclick="toggleSort('vision')">愿景层${sortArrow('vision')}</th>
      <th class="${thClass('bottleneck')}" onclick="toggleSort('bottleneck')">卡点层${sortArrow('bottleneck')}</th>
      <th class="${thClass('lever')}" onclick="toggleSort('lever')">撬动点${sortArrow('lever')}</th>
      <th>阻碍类型</th>
      <th>行动口号</th>
    </tr></thead><tbody>`;

  filteredData.forEach(d => {
    const scores = [d.env, d.beh, d.cap, d.bel, d.iden, d.vision];
    html += `<tr>
      <td>${d.nickname || '-'}</td>
      <td>${d.time || '-'}</td>
      ${scores.map(s => `<td class="score ${getScoreClass(s)}">${isNaN(s) ? '-' : s.toFixed(2)}</td>`).join('')}
      <td><span class="tag ${getTagClass(d.bottleneck)}">${d.bottleneck || '-'}</span></td>
      <td>${d.lever || '-'}</td>
      <td class="blocker-cell">${d.blocker || '-'}</td>
      <td>${d.slogan || '-'}</td>
    </tr>`;
  });

  html += `</tbody></table></div>`;
  c.innerHTML = html;
}

function exportExcel() {
  if (!filteredData.length) { alert('没有可导出的数据'); return; }

  const rows = filteredData.map((d, i) => ({
    '序号': i + 1,
    '昵称': d.nickname || '',
    '测试时间': d.time || '',
    '环境层得分': isNaN(d.env) ? '' : d.env,
    '行为层得分': isNaN(d.beh) ? '' : d.beh,
    '能力层得分': isNaN(d.cap) ? '' : d.cap,
    '信念层得分': isNaN(d.bel) ? '' : d.bel,
    '身份层得分': isNaN(d.iden) ? '' : d.iden,
    '愿景层得分': isNaN(d.vision) ? '' : d.vision,
    '卡点层': d.bottleneck || '',
    '撬动点': d.lever || '',
    '阻碍类型': d.blocker || '',
    '行动口号': d.slogan || ''
  }));

  const ws = XLSX.utils.json_to_sheet(rows);
  // 设置列宽
  ws['!cols'] = [
    {wch:5},{wch:12},{wch:18},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:10},{wch:30},{wch:30}
  ];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '测试数据');

  const now = new Date();
  const ts = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  XLSX.writeFile(wb, `NLP测试数据_${ts}.xlsx`);
}

// 初始加载
loadData();
</script>
</body>
</html>
